name: cppcheck

on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: true

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libgl-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev clang cppcheck

      - name: Build GLFW
        run: |
          cmake -B deps/glfw/build -S deps/glfw -DBUILD_SHARED_LIBS=ON -DGLFW_BUILD_WAYLAND=OFF
          cmake --build deps/glfw/build

      - name: Build PCG
        run: make pcg pcg_full

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=all \
            --suppressions-list=.cppcheck.suppressions \
            --suppress=unusedFunction \
            --suppress=missingIncludeSystem \
            --std=c11 \
            --language=c \
            --error-exitcode=1 \
            src/*.c
